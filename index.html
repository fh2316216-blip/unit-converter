<!DOCTYPE html>
<html>

<head>
<title>Unit Converter</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:40px;
border-radius:20px;
text-align:center;
width:350px;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
margin-bottom:15px;
}

select{
width:100%;
padding:12px;
font-size:16px;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
background:#2563eb;
}

.clear{
background:#ef4444;
}

.result{
margin-top:15px;
font-size:22px;
}

.footer{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="box">

<h1>Unit Converter</h1>

<input id="value" placeholder="Enter number">

<select id="type">

<option value="f2m">Feet → Meters</option>
<option value="m2f">Meters → Feet</option>
<option value="cm">Meters → CM</option>
<option value="km">Meters → KM</option>

</select>

<button onclick="convert()">Convert</button>

<button class="clear" onclick="clearBox()">Clear</button>

<div class="result" id="result"></div>

<div class="footer">
Created by Fares Hamed
</div>

</div>

<script>

function convert(){

let v=document.getElementById("value").value
let t=document.getElementById("type").value
let r=0

if(t=="f2m") r=v*0.3048
if(t=="m2f") r=v*3.28084
if(t=="cm") r=v*100
if(t=="km") r=v/1000

document.getElementById("result").innerHTML=r.toFixed(2)

}

function clearBox(){

document.getElementById("value").value=""
document.getElementById("result").innerHTML=""

}

</script>

</body>

</html>
