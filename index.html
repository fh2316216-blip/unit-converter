<!DOCTYPE html>
<html>

<head>
<title>Fares Converter</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e293b;
padding:40px;
border-radius:20px;
text-align:center;
width:350px;
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
font-size:18px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
font-size:24px;
}

.footer{
margin-top:20px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="box">

<h1>Feet → Meters</h1>

<input id="feet" placeholder="Enter feet">

<button onclick="convert()">Convert</button>

<div class="result" id="result"></div>

<div class="footer">
Created by Fares Hamed
</div>

</div>

<script>

function convert(){

let feet=document.getElementById("feet").value

let meters=feet*0.3048

document.getElementById("result").innerHTML=meters.toFixed(2)+" meters"

}

</script>

</body>

</html>
